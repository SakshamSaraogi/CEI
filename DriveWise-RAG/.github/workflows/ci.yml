name: DriveWise RAG CI Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libmupdf-dev

    - name: Install Python Packages
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic requests PyMuPDF httpx
        # Install embedding dependencies locally
        pip install qdrant-client sentence-transformers fastembed

    - name: Run Unit Tests
      run: |
        python -m unittest discover -s tests -p "test_*.py"
