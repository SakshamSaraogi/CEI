version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: drivewise-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_db:/qdrant/storage
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drivewise-backend
    ports:
      - "8000:8000"
    environment:
      - MOCK_LLM=true
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    restart: always
